<!DOCTYPE html>
<html lang="en">
<head>

    <title>Dodge Survival Game | KenPlay.Fun</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test your reflexes in this exciting Dodge Survival Game. Avoid obstacles and survive as long as you can in this thrilling mini-game at KenPlay.Fun!">
    <meta name="keywords" content="dodge survival, reflex game, mini-game, KenPlay.Fun">
    <link rel="canonical" href="https://kenplay.fun/survival.html">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kenplay.fun/survival.html">
    <meta property="og:title" content="Dodge Survival Game | KenPlay.Fun">
    <meta property="og:description" content="Test your reflexes in this exciting Dodge Survival Game. Avoid obstacles and survive as long as you can!">

    <meta property="twitter:image" content="https://kenplay.fun/res/share.png">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #87CEEB, #E0F7FA, #B2EBF2);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            font-family: Arial, sans-serif;
        }

        @keyframes gradientAnimation {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #gameArea {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #171717;
            overflow: hidden;
        }

        #player {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #00ff00;
        }

        .enemy {
            position: absolute;
            border-radius: 50%;
        }

        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }

        #gameInstructions {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            max-width: 80%;
        }

        #startButton {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #milestone {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #FFD700;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 500;
            text-shadow: 0 0 12px #FF8C00;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="gameInstructions">
        <h2>Game Instructions</h2>
        <p>Use arrow keys to move. On mobile, drag your finger to steer.</p>
        <p>At 10s, 20s, and 30s, enemies suddenly accelerate!</p>
        <p>A decoy (white circle) appears every 5 seconds to lure enemies away.</p>
        <p>Survive as long as possible!</p>
        <button id="startButton">Start Game</button>
    </div>

    <div id="gameArea">
        <div id="player"></div>
        <div id="score">Progress: 0.00s</div>
        <div id="milestone"></div>
        <div id="backToIndex" style="position:absolute;top:10px;right:10px;font-size:12px;color:rgba(255,255,255,0.5);cursor:pointer;">Back to Index</div>
    </div>

    <script>
        document.getElementById('backToIndex').addEventListener('click', function () {
            if (confirm('Are you sure you want to leave the game?')) {
                window.location.href = 'index.html';
            }
        });

        const gameArea         = document.getElementById('gameArea');
        const player           = document.getElementById('player');
        const scoreDisplay     = document.getElementById('score');
        const milestoneDisplay = document.getElementById('milestone');

        const PLAYER_SIZE = 10;
        const MAX_ENEMIES = 200;

        let enemies      = [];
        let playerPos    = { x: 0, y: 0 };
        let playerPath   = [];
        let elapsed      = 0;   // ms since game start
        let gameRunning  = false;
        let rafId        = null;
        let enemyInterval  = null;
        let helperInterval = null;
        let lastFrameTime  = 0;

        // Helper (decoy) state — stored as coordinates, not DOM rects
        let helperPos     = null;  // { x, y } or null
        let helperElement = null;

        // Track which milestones have been announced
        let milestoneShown = new Set();
        let milestoneTimer = null;

        // ── Input: keyboard ────────────────────────────────────────────
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        document.addEventListener('keydown', e => { if (e.key in keys) { keys[e.key] = true;  e.preventDefault(); } });
        document.addEventListener('keyup',   e => { if (e.key in keys) { keys[e.key] = false; } });

        // ── Input: touch — follow-finger ────────────────────────────────
        let touchTarget = null; // { x, y } in gameArea coords

        gameArea.addEventListener('touchstart', e => {
            e.preventDefault();
            const r = gameArea.getBoundingClientRect();
            const t = e.touches[0];
            touchTarget = { x: t.clientX - r.left, y: t.clientY - r.top };
        }, { passive: false });

        gameArea.addEventListener('touchmove', e => {
            e.preventDefault();
            const r = gameArea.getBoundingClientRect();
            const t = e.touches[0];
            touchTarget = { x: t.clientX - r.left, y: t.clientY - r.top };
        }, { passive: false });

        gameArea.addEventListener('touchend',   () => { touchTarget = null; });
        gameArea.addEventListener('touchcancel',() => { touchTarget = null; });

        // ── Player movement ─────────────────────────────────────────────
        function movePlayer(dt) {
            const step = 10 * (dt / 50); // speed normalised to original 50 ms tick
            let dx = 0, dy = 0;

            if (touchTarget) {
                const cx  = playerPos.x + PLAYER_SIZE / 2;
                const cy  = playerPos.y + PLAYER_SIZE / 2;
                const tdx = touchTarget.x - cx;
                const tdy = touchTarget.y - cy;
                const d   = Math.sqrt(tdx * tdx + tdy * tdy);
                if (d > 2) { dx = (tdx / d) * step; dy = (tdy / d) * step; }
            } else {
                if (keys.ArrowUp)    dy -= step;
                if (keys.ArrowDown)  dy += step;
                if (keys.ArrowLeft)  dx -= step;
                if (keys.ArrowRight) dx += step;
                if (dx !== 0 && dy !== 0) { dx /= Math.SQRT2; dy /= Math.SQRT2; }
            }

            const W = gameArea.clientWidth;
            const H = gameArea.clientHeight;
            playerPos.x = Math.max(0, Math.min(W - PLAYER_SIZE, playerPos.x + dx));
            playerPos.y = Math.max(0, Math.min(H - PLAYER_SIZE, playerPos.y + dy));

            player.style.left = playerPos.x + 'px';
            player.style.top  = playerPos.y + 'px';

            playerPath.push({ x: playerPos.x, y: playerPos.y });
        }

        // ── Enemy creation ──────────────────────────────────────────────
        function createEnemy() {
            if (enemies.length >= MAX_ENEMIES) return;

            const W  = gameArea.clientWidth;
            const H  = gameArea.clientHeight;
            const cx = W / 2;
            const cy = H / 2;

            const angle   = Math.random() * 2 * Math.PI;
            const minDist = Math.max(W, H) / 4;
            const dist    = minDist + Math.random() * minDist;

            const x = Math.max(0, Math.min(W - 10, cx + Math.cos(angle) * dist));
            const y = Math.max(0, Math.min(H - 10, cy + Math.sin(angle) * dist));

            const rnd   = Math.random();
            const color = rnd < 0.8 ? '#ff0000' : (rnd < 0.95 ? '#800080' : '#0000ff');

            const sRnd = Math.random();
            const size = sRnd < 0.8 ? 10 : (sRnd < 0.9 ? 20 : 30);

            const el = document.createElement('div');
            el.className = 'enemy';
            el.style.width           = size + 'px';
            el.style.height          = size + 'px';
            el.style.backgroundColor = color;
            el.style.left            = x + 'px';
            el.style.top             = y + 'px';
            gameArea.appendChild(el);

            enemies.push({
                element: el,
                x, y, size,
                xSpeed: (Math.random() - 0.5) * 6,
                ySpeed: (Math.random() - 0.5) * 6,
                attractedToHelper: false
            });
        }

        // ── Enemy update — no getBoundingClientRect in hot path ─────────
        function updateEnemies(dt) {
            const W        = gameArea.clientWidth;
            const H        = gameArea.clientHeight;
            const maxDim   = Math.max(W, H);
            const dtFactor = dt / 50;
            const seconds  = elapsed / 1000;
            const px       = playerPos.x;
            const py       = playerPos.y;

            let fastCount = 0;
            if (seconds >= 30) fastCount = 6;
            else if (seconds >= 20) fastCount = 4;
            else if (seconds >= 10) fastCount = 2;

            enemies = enemies.filter((obj, index) => {
                // Cull enemies that have drifted far from the player
                const cdx  = px - obj.x;
                const cdy  = py - obj.y;
                if (cdx * cdx + cdy * cdy > (maxDim / 2) * (maxDim / 2)) {
                    gameArea.removeChild(obj.element);
                    return false;
                }

                // Choose target: helper decoy or player
                let targetX = px, targetY = py;
                if (obj.attractedToHelper && helperPos) {
                    targetX = helperPos.x;
                    targetY = helperPos.y;
                }

                const tdx   = targetX - obj.x;
                const tdy   = targetY - obj.y;
                const tdist = Math.sqrt(tdx * tdx + tdy * tdy) || 1;
                const dirX  = tdx / tdist;
                const dirY  = tdy / tdist;

                const speedMult = (index < fastCount) ? 5 : 1;
                const rand      = Math.random() * 0.5 + 0.75;

                obj.x += (dirX * 2 + obj.xSpeed) * rand * speedMult * dtFactor;
                obj.y += (dirY * 2 + obj.ySpeed) * rand * speedMult * dtFactor;

                // Bounce off walls
                if (obj.x <= 0 || obj.x >= W - obj.size) {
                    obj.xSpeed = -obj.xSpeed;
                    obj.x = Math.max(0, Math.min(W - obj.size, obj.x));
                }
                if (obj.y <= 0 || obj.y >= H - obj.size) {
                    obj.ySpeed = -obj.ySpeed;
                    obj.y = Math.max(0, Math.min(H - obj.size, obj.y));
                }

                obj.element.style.left = obj.x + 'px';
                obj.element.style.top  = obj.y + 'px';

                // AABB collision with player
                if (!(px + PLAYER_SIZE < obj.x || px > obj.x + obj.size ||
                      py + PLAYER_SIZE < obj.y || py > obj.y + obj.size)) {
                    endGame();
                }

                return true;
            });
        }

        // ── Helper (decoy) ──────────────────────────────────────────────
        function createHelper() {
            // Remove any existing helper
            if (helperElement && helperElement.parentNode === gameArea) {
                gameArea.removeChild(helperElement);
            }

            const W  = gameArea.clientWidth;
            const H  = gameArea.clientHeight;
            const hx = Math.random() * (W - 20);
            const hy = Math.random() * (H - 20);

            helperPos     = { x: hx, y: hy };
            helperElement = document.createElement('div');
            helperElement.style.cssText =
                `position:absolute;width:20px;height:20px;background-color:#e0e0e0;
                 border-radius:50%;left:${hx}px;top:${hy}px;box-shadow:0 0 8px #fff;`;
            gameArea.appendChild(helperElement);

            // Attract 30 % of enemies toward the decoy
            enemies.forEach(obj => { obj.attractedToHelper = Math.random() < 0.3; });

            setTimeout(() => {
                if (helperElement && helperElement.parentNode === gameArea) {
                    gameArea.removeChild(helperElement);
                }
                helperElement = null;
                helperPos     = null;
                enemies.forEach(obj => { obj.attractedToHelper = false; });
            }, 3000);
        }

        // ── Milestone flash ─────────────────────────────────────────────
        function showMilestone(text) {
            clearTimeout(milestoneTimer);
            milestoneDisplay.textContent = text;
            milestoneDisplay.style.opacity = '1';
            milestoneTimer = setTimeout(() => { milestoneDisplay.style.opacity = '0'; }, 1800);
        }

        // ── Main game loop (requestAnimationFrame) ──────────────────────
        function gameLoop(timestamp) {
            if (!gameRunning) return;

            const dt   = Math.min(timestamp - lastFrameTime, 100); // cap at 100 ms to avoid spiral of death
            lastFrameTime = timestamp;
            elapsed += dt;

            // Update score display
            const secs = Math.floor(elapsed / 1000);
            const cs   = Math.floor((elapsed % 1000) / 10); // centiseconds
            scoreDisplay.textContent = `Progress: ${secs}.${cs.toString().padStart(2, '0')}s`;

            // Milestone alerts
            if (secs >= 10 && !milestoneShown.has(10)) { milestoneShown.add(10); showMilestone('SPEED UP!'); }
            if (secs >= 20 && !milestoneShown.has(20)) { milestoneShown.add(20); showMilestone('FASTER!'); }
            if (secs >= 30 && !milestoneShown.has(30)) { milestoneShown.add(30); showMilestone('MAXIMUM SPEED!'); }

            movePlayer(dt);
            updateEnemies(dt);

            rafId = requestAnimationFrame(gameLoop);
        }

        // ── Draw player path on game-over screen ────────────────────────
        function drawPlayerPath() {
            if (playerPath.length < 2) return;
            const canvas  = document.createElement('canvas');
            canvas.width  = gameArea.clientWidth;
            canvas.height = gameArea.clientHeight;
            canvas.style.cssText = 'position:absolute;top:0;left:0;z-index:999;pointer-events:none;';
            gameArea.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            ctx.strokeStyle = 'rgba(0,255,0,1)';
            ctx.lineWidth   = 2;
            ctx.beginPath();
            ctx.moveTo(playerPath[0].x, playerPath[0].y);
            for (let i = 1; i < playerPath.length - 1; i++) {
                const cp = {
                    x: (playerPath[i].x + playerPath[i + 1].x) / 2,
                    y: (playerPath[i].y + playerPath[i + 1].y) / 2
                };
                ctx.bezierCurveTo(playerPath[i].x, playerPath[i].y, cp.x, cp.y, playerPath[i + 1].x, playerPath[i + 1].y);
            }
            ctx.lineTo(playerPath[playerPath.length - 1].x, playerPath[playerPath.length - 1].y);
            ctx.stroke();
        }

        // ── End game ────────────────────────────────────────────────────
        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(rafId);
            clearInterval(enemyInterval);
            clearInterval(helperInterval);
            clearTimeout(milestoneTimer);

            const finalScore = scoreDisplay.textContent.split(': ')[1];

            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;';
            document.body.appendChild(overlay);

            const container = document.createElement('div');
            container.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:1001;width:80%;max-width:400px;opacity:0;';
            container.innerHTML = `
                <div style="color:#FF4136;font-size:36px;font-weight:bold;margin-bottom:20px;">Game Over!</div>
                <div style="color:#fff;font-size:24px;margin-bottom:15px;">Your score: ${finalScore}</div>
                <div style="color:#fff;font-size:24px;margin-bottom:30px;">Total steps: ${playerPath.length}</div>
            `;
            document.body.appendChild(container);

            drawPlayerPath();

            // Clean up game objects
            enemies.forEach(obj => { if (obj.element.parentNode === gameArea) gameArea.removeChild(obj.element); });
            enemies = [];
            if (helperElement && helperElement.parentNode === gameArea) gameArea.removeChild(helperElement);
            helperElement = null;
            helperPos     = null;

            setTimeout(() => {
                const restartMsg = document.createElement('div');
                restartMsg.textContent = 'Press any key or tap to restart';
                restartMsg.style.cssText = 'color:#7FDBFF;font-size:18px;cursor:pointer;';
                container.appendChild(restartMsg);

                function restartGame() {
                    document.body.removeChild(overlay);
                    document.body.removeChild(container);
                    document.removeEventListener('keydown', restartGame);
                    document.removeEventListener('touchstart', restartGame);
                    startGame();
                }
                document.addEventListener('keydown', restartGame);
                document.addEventListener('touchstart', restartGame);
            }, 2000);

            // Fade in game-over panel
            let opacity = 0;
            const fadeIn = setInterval(() => {
                opacity = Math.min(1, opacity + 0.1);
                container.style.opacity = opacity;
                if (opacity >= 1) clearInterval(fadeIn);
            }, 50);
        }

        // ── Start / restart game ────────────────────────────────────────
        function startGame() {
            const existing = gameArea.querySelector('canvas');
            if (existing) gameArea.removeChild(existing);

            const W = gameArea.clientWidth;
            const H = gameArea.clientHeight;

            playerPos = { x: W / 2 - PLAYER_SIZE / 2, y: H / 2 - PLAYER_SIZE / 2 };
            player.style.left = playerPos.x + 'px';
            player.style.top  = playerPos.y + 'px';

            playerPath     = [{ x: playerPos.x, y: playerPos.y }];
            elapsed        = 0;
            enemies        = [];
            helperPos      = null;
            helperElement  = null;
            milestoneShown = new Set();
            gameRunning    = true;

            const isMobile   = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const enemyCount = isMobile ? 10 : 40;
            for (let i = 0; i < enemyCount; i++) createEnemy();

            enemyInterval  = setInterval(createEnemy, 100);
            helperInterval = setInterval(createHelper, 5000);

            lastFrameTime = performance.now();
            rafId = requestAnimationFrame(gameLoop);
        }

        document.getElementById('startButton').addEventListener('click', () => {
            document.getElementById('gameInstructions').style.display = 'none';
            startGame();
        });
    </script>
</body>
</html>
